models:
  - name: export.vw_cmap
    description: '{{ doc("view_vw_cmap") }}'

    columns:
      - name: pin
        description: '{{ doc("shared_column_pin") }}'

    data_tests:
      - row_count:
          name: export_vw_cmap_row_count
          equals: >
            (
              SELECT DISTINCT
                asmt_all.parid,
                dweldat.card,
                asmt_all.taxyr
              FROM {{ source("iasworld", "asmt_all") }} AS asmt_all
              LEFT JOIN {{ source("iasworld", "dweldat") }} AS dweldat
                ON asmt_all.parid = dweldat.parid
                AND asmt_all.taxyr = dweldat.taxyr
                AND dweldat.deactivat IS NULL
                AND dweldat.cur = 'Y'
              WHERE asmt_all.deactivat IS NULL
                AND asmt_all.procname = 'BORVALUE'
                AND asmt_all.valclass IS NULL -- Class 999 are test pins
                AND asmt_all.class NOT IN ('999')
                AND asmt_all.taxyr IN ('2023', '2024')
            )
      - unique_combination_of_columns:
          name: export_vw_cmap_unique_by_pin_card_and_year
          combination_of_columns:
            - pin
            - year
            - card

