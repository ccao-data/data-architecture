models:
  - name: export.vw_cmap
    description: '{{ doc("view_vw_cmap") }}'

    columns:
      - name: pin
        description: '{{ doc("shared_column_pin") }}'

    data_tests:
      - row_count:
          name: export_vw_cmap_row_count
          equals: >
            (
              SELECT COUNT(*) DISTINCT
                asmt_all.parid,
                dweldat.card,
                asmt_all.taxyr
              FROM (
                SELECT DISTINCT parid, taxyr
              FROM {{ source("iasworld", "asmt_all") }}
              WHERE procname = 'BORVALUE'
                AND valclass IS NULL -- Class 999 are test pins
                AND class NOT IN ('999')
                AND taxyr IN ('2023', '2024')
              ) AS asmt_all
              LEFT JOIN {{ source("iasworld", "dweldat") }} AS dweldat
                ON asmt_all.parid = dweldat.parid
                AND asmt_all.taxyr = dweldat.taxyr
                AND dweldat.deactivat IS NULL
                AND dweldat.cur = 'Y'
            )
      - unique_combination_of_columns:
          name: export_vw_cmap_unique_by_pin_card_and_year
          combination_of_columns:
            - pin
            - year
            - card

