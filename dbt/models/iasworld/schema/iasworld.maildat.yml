sources:
  - name: iasworld
    loaded_at_field: date_parse(loaded_at, '%Y-%m-%d %H:%i:%S.%f')
    tags:
      - load_auto
      - data_test_iasworld

    tables:
      - name: maildat
        description: '{{ doc("table_maildat") }}'
        freshness:
          filter: taxyr >= date_format(current_date - interval '1' year, '%Y')
          warn_after: {count: 24, period: hour}
          error_after: {count: 48, period: hour}

        columns:
          - name: addrtype
            description: '{{ doc("column_addrtype") }}'
          - name: addrvalid
            description: '{{ doc("column_addrvalid") }}'
          - name: attn
            description: '{{ doc("column_attn") }}'
          - name: begdate
            description: Beginning effective date for this entry
          - name: careof
            description: '{{ doc("column_careof") }}'
          - name: carrier_rt
            description: '{{ doc("column_carrier_rt") }}'
          - name: chgdate
            description: Date requested change
          - name: compartment
            description: '{{ doc("column_compartment") }}'
          - name: conv1
            description: Old data for conversion 1 - NOT TO BE USED IN TRANSACTIONS
          - name: cur
            description: '{{ doc("column_cur") }}'
            data_tests:
              - accepted_values:
                  name: iasworld_maildat_cur_in_accepted_values
                  values: ['Y', 'D']
                  additional_select_columns: &select-columns
                    - taxyr
                    - parid
                    - who
                    - wen
                  config:
                    where: |
                      CAST(taxyr AS int) BETWEEN {{ var('data_test_iasworld_year_start') }} AND {{ var('data_test_iasworld_year_end') }}
                  meta:
                    description: cur should be 'Y' or 'D'
          - name: deactivat
            description: '{{ doc("column_deactivat") }}'
          - name: delinstalltype
            description: '{{ doc("column_delinstalltype") }}'
          - name: delinstallval
            description: '{{ doc("column_delinstallval") }}'
          - name: delmod
            description: '{{ doc("column_delmod") }}'
          - name: delmodval
            description: '{{ doc("column_delmodval") }}'
          - name: email
            description: '{{ doc("column_email") }}'
          - name: enddate
            description: Ending effective date for this entry
          - name: fax
            description: '{{ doc("column_fax") }}'
          - name: fedid
            description: '{{ doc("column_fedid") }}'
          - name: floorno
            description: '{{ doc("column_floorno") }}'
          - name: hidename
            description: Flag to hide name/address from public view (Y)
          - name: iasw_id
            description: '{{ doc("column_iasw_id") }}'
          - name: jur
            description: '{{ doc("column_jur") }}'
          - name: landcontr
            description: Land contract flag
          - name: loaded_at
            description: '{{ doc("shared_column_loaded_at") }}'
          - name: ltrcode
            description: Conveyance letter code
          - name: maddr1
            description: Mailing address line 1
          - name: maddr2
            description: Maling address line 2
          - name: maddr3
            description: Mailing address line 3
          - name: maddr4
            description: '{{ doc("column_addr4") }}'
          - name: maddr5
            description: '{{ doc("column_addr5") }}'
          - name: madradd
            description: Street number extension
          - name: madrdir
            description: '{{ doc("column_adrdir") }}'
          - name: madrgrid
            description: '{{ doc("column_adrgrid") }}'
          - name: madrno
            description: '{{ doc("column_adrno") }}'
          - name: madrpre
            description: '{{ doc("column_adrpre") }}'
          - name: madrstr
            description: '{{ doc("column_adrstr") }}'
          - name: madrsuf
            description: '{{ doc("column_adrsuf") }}'
          - name: madrsuf2
            description: '{{ doc("column_adrsuf2") }}'
          - name: mail1
            description: Mailing name line 1
          - name: mail1_companyname
            description: Mailing Name 1 Company Name
          - name: mail1_firstname
            description: Mailing Name 1 First Name
          - name: mail1_lastname
            description: Mailing Name 1 Last Name
          - name: mail1_middlename
            description: Mailing Name 1 Middle Name
          - name: mail1_prefix
            description: Mailing Name 1 Prefix
          - name: mail1_suffix
            description: Mailing Name 1 Suffix
          - name: mail2
            description: Mailing name line 2
          - name: mail2_companyname
            description: Mailing Name 2 Company Name
          - name: mail2_firstname
            description: Mailing Name 2 First Name
          - name: mail2_lastname
            description: Mailing Name 2 Last Name
          - name: mail2_middlename
            description: Mailing Name 2 Middle Name
          - name: mail2_prefix
            description: Mailing Name 2 Prefix
          - name: mail2_suffix
            description: Mailing Name 2 Suffix
          - name: mailcode
            description: Code identifying relationship to property owner
          - name: mailseq
            description: Mailing sequence number
          - name: mcityname
            description: '{{ doc("shared_column_mail_address_city_name") }}'
          - name: mcountry
            description: '{{ doc("column_country") }}'
          - name: mnamejur
            description: Stores MNAME.JUR when MOWNNUM is populated in hierarchical jur sites
          - name: mortco
            description: Mortgage company number
          - name: mortno
            description: Mortgage company account number
          - name: mownnum
            description: Mailing pointer to name/address table (MNAME)
          - name: mpostalcode
            description: '{{ doc("column_postalcode") }}'
          - name: mstatecode
            description: '{{ doc("shared_column_mail_address_state") }}'
          - name: munitdesc
            description: '{{ doc("column_unitdesc") }}'
          - name: munitno
            description: '{{ doc("column_unitno") }}'
          - name: mzip1
            description: '{{ doc("shared_column_mail_address_zipcode_1") }}'
          - name: mzip2
            description: '{{ doc("shared_column_mail_address_zipcode_2") }}'
          - name: note1
            description: Note field 1
          - name: note2
            description: Note field 2
          - name: ownseq
            description: '{{ doc("column_ownseq") }}'
          - name: parid
            description: '{{ doc("shared_column_pin") }}'
            data_tests:
              - relationships:
                  name: iasworld_maildat_parid_in_pardat_parid
                  to: source('iasworld', 'pardat')
                  field: parid
                  additional_select_columns: &select-columns-no-parid
                    - taxyr
                    - who
                    - wen
                  config: &unique-conditions
                    where: |
                      CAST(taxyr AS int) BETWEEN {{ var('data_test_iasworld_year_start') }} AND {{ var('data_test_iasworld_year_end') }}
                      AND cur = 'Y'
                      AND deactivat IS NULL
                  meta:
                    category: parid
                    description: parid should be in pardat
              - not_null:
                  name: iasworld_maildat_parid_not_null
                  additional_select_columns: *select-columns-no-parid
                  config: *unique-conditions
                  meta:
                    description: parid should not be null
          - name: parlink
            description: Parcel linkage number
          - name: paycode
            description: Payment code
          - name: phone
            description: '{{ doc("column_phone") }}'
          - name: postal_indx
            description: '{{ doc("column_postal_indx") }}'
          - name: reasmail
            description: Reason for mailing change
          - name: rollover
            description: Rollover flag
          - name: seq
            description: '{{ doc("shared_column_seq") }}'
          - name: site
            description: '{{ doc("column_site") }}'
          - name: skip_addr_validation
            description: '{{ doc("column_skip_addr_validation") }}'
          - name: ssn
            description: Social security number
          - name: stateid
            description: '{{ doc("column_stateid") }}'
          - name: status
            description: '{{ doc("column_status") }}'
          - name: taxsusp
            description: Tax suspension flag
          - name: taxyr
            description: '{{ doc("shared_column_year") }}'
          - name: trans_id
            description: '{{ doc("column_trans_id") }}'
          - name: upd_status
            description: '{{ doc("column_upd_status") }}'
          - name: vldrsc
            description: No Validation Reason Code
          - name: wen
            description: '{{ doc("shared_column_updated_at") }}'
          - name: wencalc
            description: '{{ doc("column_wencalc") }}'
          - name: who
            description: '{{ doc("shared_column_updated_by") }}'
          - name: whocalc
            description: '{{ doc("column_whocalc") }}'

        data_tests:
          - unique_combination_of_columns:
              name: iasworld_maildat_unique_by_parid_taxyr_mailseq
              combination_of_columns:
                - parid
                - taxyr
                - mailseq
              additional_select_columns:
                - column: who
                  alias: who
                  agg_func: array_agg
                - column: wen
                  alias: wen
                  agg_func: array_agg
              config: *unique-conditions
              meta:
                description: maildat should be unique by parid and taxyr
